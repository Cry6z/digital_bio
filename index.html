<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yoo!</title>
  
  <!-- SEO & Social Meta -->
  <meta name="description" content="Gibran's personal digital bio and portfolio.">
  <meta name="author" content="Gibran">
  <meta property="og:title" content="Bran | Digital Bio">
  <meta property="og:description" content="Personal space of a lost guy in the digital world.">
  <meta property="og:image" content="agib.png">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">
  
  <!-- Content Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Ambient Background -->
  <video autoplay loop muted playsinline class="bg-video">
    <source src="Timeline 2.mp4" type="video/mp4">
  </video>

  <!-- Interactive Overlays -->
  <section id="entry-screen" onclick="enterSite()" aria-label="Enter site">
    <p class="pulse-text">touch!</p>
  </section>

  <section id="hello-screen" class="transition-screen" style="display: none;">
    <h1 class="hello-text">hello</h1>
  </section>

  <section id="response-screen" class="transition-screen" style="display: none;">
    <div class="res-content">
      <h2 class="res-question">how are you today?</h2>
      <div class="res-options">
        <button class="res-btn" onclick="selectResponse('fine')" aria-label="I am doing good">very good!</button>
        <button class="res-btn" onclick="selectResponse('bad')" aria-label="I am doing bad">very bad...</button>
      </div>
    </div>
  </section>

  <!-- Cinematic Transition Scenes -->
  <section id="now-playing-screen" class="transition-screen" style="display: none;">
    <div class="np-content">
      <p class="np-label">PLAYING :</p>
      <div class="np-disc-wrapper">
        <img src="" id="np-disc" class="np-disc-big" alt="Album Disc">
        <div class="np-disc-hole"></div>
      </div>
      <div class="np-info">
        <h2 id="np-title" class="np-title"></h2>
        <p id="np-artist" class="np-artist"></p>
      </div>
      <div class="np-progress-bar">
        <div class="np-progress-inner"></div>
      </div>
    </div>
  </section>

  <section id="connected-screen" class="transition-screen" style="display: none;">
    <div class="nc-content">
      <h1 class="nc-text">you're connected</h1>
      <div class="nc-checkmark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
    </div>
  </section>

  <section id="welcome-screen" class="transition-screen" style="display: none;">
    <div class="vw-content">
      <h1 class="vw-text">welcome!</h1>
    </div>
  </section>

  <!-- Visual Feedback -->
  <div id="flash-overlay"></div>

  <!-- Main Dashboard -->
  <main class="container" id="main-container" style="display: none;">
    
    <!-- Left Side: Profile Info -->
    <header class="profile-column">
      <div class="profile-wrapper">
        <div class="pulse-ring"></div>
        
        <!-- 3D Flip Profile -->
        <div class="profile-flip-container" id="profile-card">
          <div class="profile-flip-inner">
            <!-- Front Face -->
            <div class="profile-flip-front">
              <img src="agib.png" alt="Gibran - Front Profile" class="profile-img">
            </div>
            <!-- Back Face -->
            <div class="profile-flip-back">
              <img src="agib2.png" alt="Gibran - Alternate Profile" class="profile-img">
            </div>
          </div>
        </div>
      </div>

      <div class="header-text">
        <div class="name-wrapper">
          <h1 class="name">Gibran</h1>
        </div>
        <p class="bio">verloren guy</p>
        <div class="tags-container">
          <span class="tag"># gamer</span>
          <span class="tag"># design</span>
          <span class="tag"># code</span>
          <span class="tag"># skill_issue</span>
          <span class="tag"># noob</span>
        </div>
      </div>
    </header>

    <div class="divider"></div>

    <!-- Right Side: Links Navigation -->
    <nav class="links-column">
      <div class="links-container">
        
        <a href="http://strxdale-catalog.vercel.app/" class="link-card" target="_blank" data-preview="preview/catalog.png">
          <div class="link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="2" y1="12" x2="22" y2="12"></line>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
          </div>
          <span class="link-text">Catalog</span>
          <div class="link-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </div>
        </a>

        <a href="https://github.com/Cry6z" class="link-card" target="_blank" data-preview="preview/github.png">
          <div class="link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
            </svg>
          </div>
          <span class="link-text">GitHub</span>
          <div class="link-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </div>
        </a>

        <a href="https://www.instagram.com/verlorenbran" class="link-card" target="_blank" data-preview="preview/ig.png">
          <div class="link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
          </div>
          <span class="link-text">Instagram</span>
          <div class="link-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </div>
        </a>

        <a href="https://steamcommunity.com/profiles/76561199165908964/" class="link-card" target="_blank" data-preview="preview/steam.png">
          <div class="link-icon">
            <img src="icons/steam.png" alt="Steam" style="width: 22px; height: 22px; filter: brightness(0) invert(1);">
          </div>
          <span class="link-text">Steam</span>
          <div class="link-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </div>
        </a>

        <a href="https://open.spotify.com/user/31t4pdanvx27zaiw35tu2bmu5kqa" class="link-card" target="_blank" data-preview="preview/spotify.png">
          <div class="link-icon">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.372 12-12S18.627 0 12 0zm5.502 17.31c-.218.358-.684.47-1.042.252-2.875-1.758-6.495-2.156-10.757-1.18-.41.093-.82-.16-.914-.572-.093-.41.16-.82.572-.914 4.656-1.066 8.653-.615 11.89 1.363.358.218.47.684.25 1.05zm1.468-3.26c-.274.444-.858.583-1.302.308-3.29-2.023-8.303-2.61-12.185-1.433-.497.15-1.025-.13-1.176-.628-.15-.497.13-1.025.628-1.176 4.436-1.347 9.965-.694 13.725 1.62.443.273.582.853.31 1.31zm.128-3.395c-3.947-2.344-10.463-2.56-14.253-1.408-.606.184-1.25-.164-1.434-.77-.184-.606.164-1.25.77-1.434 4.34-1.318 11.536-1.062 16.082 1.637.544.323.724 1.03.4 1.575-.323.544-1.03.723-1.565.4z" />
            </svg>
          </div>
          <span class="link-text">Spotify</span>
          <div class="link-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </div>
        </a>

        <a href="https://www.roblox.com/users/634367340/profile" class="link-card" target="_blank" data-preview="preview/roblox.png">
          <div class="link-icon">
            <img src="icons/roblox.png" alt="Roblox" style="width: 22px; height: 22px; filter: brightness(0) invert(1);">
          </div>
          <span class="link-text">Roblox</span>
          <div class="link-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </div>
        </a>
      </div>
    </nav>
  </main>

  <!-- Audio Resources -->
  <aside class="audio-assets">
    <audio id="impact-sound" src="sound_effect/flash.mp3" preload="auto"></audio>
    <audio id="ding-sound" src="sound_effect/ding.mp3" preload="auto"></audio>
    <audio id="hello-voice" src="voice/Hello.mp3" preload="auto"></audio>
    <audio id="ready-voice-2" src="voice/howareyoutoday.mp3" preload="auto"></audio>
    <audio id="welcome-voice" src="voice/welcome!.mp3" preload="auto"></audio>
    
    <!-- Response Audio Groups -->
    <div class="good-voices">
      <audio id="good-voice-1" src="good/good1.mp3" preload="auto"></audio>
      <audio id="good-voice-2" src="good/good2.mp3" preload="auto"></audio>
      <audio id="good-voice-3" src="good/good3.mp3" preload="auto"></audio>
    </div>
    <div class="bad-voices">
      <audio id="bad-voice-1" src="bad/bad1.mp3" preload="auto"></audio>
      <audio id="bad-voice-2" src="bad/bad2.mp3" preload="auto"></audio>
      <audio id="bad-voice-3" src="bad/bad3.mp3" preload="auto"></audio>
    </div>
  </aside>

  <!-- Lightbox Overlay -->
  <div id="lightbox" class="lightbox" onclick="toggleZoom(null)">
    <img src="agib.png" class="lightbox-img" id="lightbox-img" alt="Enlarged profile view">
  </div>

  <!-- Perspective Music Player -->
  <div class="music-player" id="music-player" style="display: none;">
    <div class="player-content">
      <div class="album-art-wrapper">
        <img src="disk.png" alt="Album Art" id="album-art" class="album-art">
        <div class="album-hole"></div>
      </div>
      <div class="song-info">
        <p class="song-title"><span>Nama Lagu</span></p>
        <p class="song-artist">Nama Artis</p>
      </div>
      <div class="player-controls">
        <button class="control-btn" onclick="prevSong()" aria-label="Previous Song">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
          </svg>
        </button>
        <button id="play-btn" class="play-btn" onclick="togglePlay()" aria-label="Play/Pause">
          <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z" />
          </svg>
          <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
          </svg>
        </button>
        <button class="control-btn" onclick="nextSong()" aria-label="Next Song">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
          </svg>
        </button>
      </div>
    </div>
    
    <!-- Progress Control -->
    <div class="progress-container">
      <span id="current-time">0:00</span>
      <input type="range" id="progress-bar" class="progress-bar" value="0" step="0.1" oninput="seekAudio()" aria-label="Seek progress">
      <span id="total-time">0:00</span>
    </div>
    
    <audio id="bg-music" onended="nextSong()" ontimeupdate="updateProgress()" onloadedmetadata="setMetadata()">
      <source src="" type="audio/mpeg">
    </audio>
  </div>

  <!-- Link Card Hover Preview -->
  <div id="link-preview" class="link-preview">
    <img src="" id="preview-img" alt="Hover preview">
  </div>

  <!-- Footer & Status Controls -->
  <footer id="bottom-right-controls" class="bottom-right-controls" style="display: none;">
    <span class="quote-text" id="quote-text"></span>
    <button id="zen-btn" class="zen-btn" onclick="toggleZenMode()" title="Toggle Zen Mode">
      <svg id="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
      <svg id="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
        <line x1="1" y1="1" x2="23" y2="23"></line>
      </svg>
    </button>
  </footer>

  <!-- Application Logic -->
  <script src="script.js"></script>

</body>
</html>
